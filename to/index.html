<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- <link rel="icon" type="image/svg+xml" href="favicon.svg" /> -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>to App</title>
  </head>
  <body>
    <script>
      (async function () {
        const challenge = location.pathname.split("/").at(-1);
        try {
          const response = await fetch(`/api/countersigns/${challenge}`);
          const responseAsJson = await response.json();
          console.log(responseAsJson.password);
          location.replace(responseAsJson.password);
        } catch (e) {
          console.error(e, "not found");
          document.body.insertAdjacentText(
            "afterbegin",
            `NOT_FOUND: ${challenge}`
          );
        }
      })();
    </script>
  </body>
</html>
